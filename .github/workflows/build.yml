name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project ChatGPTClient.xcodeproj \
            -scheme ChatGPTClient \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive app
        run: |
          mkdir -p build
          xcodebuild \
            -project ChatGPTClient.xcodeproj \
            -scheme ChatGPTClient \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTClient.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Export IPA
        run: |
          mkdir -p build/export/Payload
          APP_PATH=$(find "$PWD/build/ChatGPTClient.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive"
            exit 1
          fi
          cp -R "$APP_PATH" build/export/Payload/
          cd build/export
          /usr/bin/zip -r ChatGPTClient.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTClient-ipa
          path: build/export/ChatGPTClient.ipa

