name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project ChatGPTClient.xcodeproj \
            -scheme ChatGPTClient \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive app
        run: |
          mkdir -p build
          xcodebuild \
            -project ChatGPTClient.xcodeproj \
            -scheme ChatGPTClient \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ChatGPTClient.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Export IPA
        run: |
          mkdir -p build/export/Payload
          APP_PATH=$(find "$PWD/build/ChatGPTClient.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive"
            exit 1
          fi
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
          if [ -z "$EXECUTABLE_NAME" ] || [ ! -f "$APP_PATH/$EXECUTABLE_NAME" ]; then
            echo "Unable to locate main binary inside app bundle"
            ls -la "$APP_PATH"
            exit 1
          fi
          cp -R "$APP_PATH" build/export/Payload/

          cd build/export
          APP_NAME=$(basename "$APP_PATH")
          PAD_FILE="Payload/$APP_NAME/.sizepad.bin"
          MIN_SIZE=$((3 * 1024 * 1024))
          MAX_SIZE=$((10 * 1024 * 1024))
          TARGET_SIZE=$((4 * 1024 * 1024))

          package_ipa () {
            rm -f ChatGPTClient.ipa
            /usr/bin/zip -qry ChatGPTClient.ipa Payload
          }

          # First package without padding.
          rm -f "$PAD_FILE"
          package_ipa
          IPA_SIZE=$(stat -f%z ChatGPTClient.ipa)

          # If too small, add incompressible padding so IPA lands in the desired range.
          if [ "$IPA_SIZE" -lt "$MIN_SIZE" ]; then
            PAD_BYTES=$((TARGET_SIZE - IPA_SIZE))
            if [ "$PAD_BYTES" -lt 262144 ]; then
              PAD_BYTES=262144
            fi
            openssl rand -out "$PAD_FILE" "$PAD_BYTES"
            package_ipa
            IPA_SIZE=$(stat -f%z ChatGPTClient.ipa)
          fi

          # Top up once more if compression ratio still keeps IPA below 3 MB.
          if [ "$IPA_SIZE" -lt "$MIN_SIZE" ]; then
            EXTRA_BYTES=$((MIN_SIZE - IPA_SIZE + 262144))
            openssl rand "$EXTRA_BYTES" >> "$PAD_FILE"
            package_ipa
            IPA_SIZE=$(stat -f%z ChatGPTClient.ipa)
          fi

          echo "Final IPA size: $IPA_SIZE bytes"
          if [ "$IPA_SIZE" -lt "$MIN_SIZE" ] || [ "$IPA_SIZE" -gt "$MAX_SIZE" ]; then
            echo "IPA size is out of range (3MB-10MB)."
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTClient-ipa
          path: build/export/ChatGPTClient.ipa

